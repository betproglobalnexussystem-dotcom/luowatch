kind = "web"
previewPath = "/"
title = "SFlix Movie Platform"
version = "1.0.0"
id = "artifacts/sflix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25971

[services.development]
run = "pnpm --filter @workspace/sflix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sflix", "run", "build" ]
publicDir = "artifacts/sflix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25971"
BASE_PATH = "/"
